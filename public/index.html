<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Comisiones - MVC</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="var(--primary)"/>
                    <path d="M2 17L12 22L22 17M2 12L12 17L22 12" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Analytics Core</span>
            </div>
            <nav class="nav">
                <span>Arquitectura MVC</span>
            </nav>
        </header>

        <main class="main-content">
            <div class="glass-card panel-filtros">
                <h1>Cálculo de Comisiones</h1>
                
                <form id="filtroForm" class="form">
                    <div class="input-group">
                        <label for="fechaInicio">Fecha de Inicio</label>
                        <input type="date" id="fechaInicio" name="fechaInicio" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="fechaFin">Fecha Fin</label>
                        <input type="date" id="fechaFin" name="fechaFin" required>
                    </div>
                    
                    <button type="submit" class="btn-primary" id="btnCalcular">
                        <span>Calcular Comisiones</span>
                        <div class="loader" id="loader" style="display: none;"></div>
                    </button>
                </form>
            </div>

            <div class="glass-card panel-resultados">
                <h2>Resultados</h2>
                <div id="resultadosContainer" class="resultados-grid">
                    <div class="empty-state">
                        <p>Aplica un filtro para visualizar los resultados.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
